apiVersion: apps/v1
kind: Deployment
metadata:
  name: golang-gitops-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: golang-gitops-project
  template:
    metadata:
      labels:
        app: golang-gitops-project
    spec:
      containers:
        - name: golang-gitops-project
          image: hegieswe/golang-gitops-project:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

